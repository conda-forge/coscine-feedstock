{% set python_min = "3.10" %}
{% set name = "coscine" %}
{% set version = "0.11.12" %}
{% set sha256 = "a8971c5ee42f91d088f0e01a2ea41d4c65cd752fb4e8f4a60aaee9a9f1aaf264" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - setuptools
    - boto3
    - pyshacl
    - python-dateutil
    - rdflib
    - requests
    - requests-cache
    - requests-toolbelt
    - tabulate
    - tqdm

test:
  imports:
    - coscine
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check

about:
  home: https://git.rwth-aachen.de/coscine/community-features/coscine-python-sdk
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: A Python Software Development Kit for Coscine.
  description: |
    The Coscine Python SDK provides a high-level interface
    to the Coscine REST API.
  doc_url: https://coscine.pages.rwth-aachen.de/community-features/coscine-python-sdk
  dev_url: https://git.rwth-aachen.de/coscine/community-features/coscine-python-sdk

extra:
  recipe-maintainers:
    - palomena
    - niklassiemer
